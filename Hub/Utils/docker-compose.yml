services:
  mediamtx:
    image: bluenviron/mediamtx:1
    container_name: mediamtx
    restart: unless-stopped
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    environment:
      MTX_WEBRTCADDITIONALHOSTS: ${LAN_IP}
    ports:
      - "8554:8554"
      - "8888:8888"
      - "8889:8889"
      - "8890:8890/udp"
      - "8189:8189/udp"
      - "9997:9997"

  detector:
    build:
      context: .
      dockerfile: Dockerfile.detect
    container_name: sentry-detector
    restart: unless-stopped
    depends_on:
      - mediamtx
    environment:
      STREAMS_API: http://host.docker.internal:8000/api/streams
      RTSP_URL_BASE: rtsp://mediamtx:8554/
      DETECTIONS_API: http://host.docker.internal:8000/api/detections
      MODEL_PATH: yolov8n.pt
      CONFIDENCE: "0.45"
      FRAME_STRIDE: "5"
      RECONNECT_DELAY_SECONDS: "3"
      LOG_EVERY_SECONDS: "5"
    extra_hosts:
      - "host.docker.internal:host-gateway"
