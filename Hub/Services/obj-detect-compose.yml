services:
  object-detection:
    build:
      context: .
      dockerfile: Dockerfile.detect
    container_name: object-detection
    restart: unless-stopped
    environment:
      STREAMS_API: http://host.docker.internal:8000/api/streams
      DETECTIONS_API: http://host.docker.internal:8000/api/detections
      RTSP_URL_BASE: rtsp://mediamtx:8554/
      MODEL_PATH: yolov8n.pt
      CONFIDENCE: "0.45"
      FRAME_STRIDE: "5"
      RECONNECT_DELAY_SECONDS: "3"
      STREAM_POLL_SECONDS: "5"
      LOG_EVERY_SECONDS: "5"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sentry-hub

networks:
  sentry-hub:
    external: true
    name: sentry-hub
