<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{.Title}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 16px;
      font-family: sans-serif;
      background: #111;
      color: #eee;
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 12px;
      min-width: 0;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 28px;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 16px;
      line-height: 1.3;
      word-break: break-word;
    }

    video {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 8px;
      object-fit: cover;
    }

    .empty {
      opacity: 0.8;
    }

    @media (max-width: 640px) {
      body {
        margin: 12px;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .card {
        padding: 10px;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 16px;
      }

      h2 {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>{{.Title}}</h1>

    {{if .Players}}
      <div class="grid">
        {{range .Players}}
          <div class="card">
            <h2>{{.Title}}</h2>
            <video
              class="hls-video"
              controls
              autoplay
              muted
              playsinline
              disableremoteplayback
              disablepictureinpicture
              data-src="{{.PlaylistURL}}">
            </video>
          </div>
        {{end}}
      </div>
    {{else}}
      <p class="empty">No streams available.</p>
    {{end}}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    document.querySelectorAll(".hls-video").forEach((video) => {
      const src = video.dataset.src;

      if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = src;
      } else if (window.Hls && Hls.isSupported()) {
        const hls = new Hls({
          lowLatencyMode: true,
          liveSyncDurationCount: 2,
          liveMaxLatencyDurationCount: 4,
          maxLiveSyncPlaybackRate: 1.15,
        });
        hls.loadSource(src);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          video.play().catch(() => {});
        });
      } else {
        const p = document.createElement("p");
        p.textContent = "Browser does not support HLS playback.";
        video.parentNode.appendChild(p);
      }
    });
  </script>
</body>
</html>
