<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{.Title}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 16px;
      font-family: sans-serif;
      background: #111;
      color: #eee;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
    }

    #status {
      margin-bottom: 16px;
      color: #bbb;
    }

    #videos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 16px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 12px;
    }

    .label {
      margin-bottom: 8px;
      font-size: 14px;
      color: #bbb;
      word-break: break-word;
    }

    iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      background: #000;
    }

    .empty {
      padding: 24px;
      border: 1px dashed #444;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>{{.Title}}</h1>
  <div id="status">loading cameras...</div>
  <div id="videos"></div>

  <script>
    const statusEl = document.getElementById("status");
    const videosEl = document.getElementById("videos");
  
    let currentKey = "";
  
    function renderStreams(streams) {
      const nextKey = JSON.stringify([...streams].sort());
      if (nextKey === currentKey) {
        statusEl.textContent = `${streams.length} active camera(s)`;
        return;
      }
  
      currentKey = nextKey;
      videosEl.innerHTML = "";
  
      if (streams.length === 0) {
        statusEl.textContent = "no active cameras";
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No active streams found.";
        videosEl.appendChild(empty);
        return;
      }
  
      statusEl.textContent = `${streams.length} active camera(s)`;
  
      for (const path of streams) {
        const card = document.createElement("div");
        card.className = "card";
  
        const label = document.createElement("div");
        label.className = "label";
        label.textContent = path;
  
        const frame = document.createElement("iframe");
        frame.allow = "autoplay; fullscreen; picture-in-picture";
        frame.src = `{{.WebRTCBase}}/${encodeURIComponent(path)}`;
  
        card.appendChild(label);
        card.appendChild(frame);
        videosEl.appendChild(card);
      }
    }
  
    async function loadStreams() {
      try {
        const resp = await fetch("/api/streams", { cache: "no-store" });
        if (!resp.ok) {
          throw new Error("failed to load streams: " + resp.status);
        }
  
        const data = await resp.json();
        const streams = Array.isArray(data.streams) ? data.streams : [];
        renderStreams(streams);
      } catch (err) {
        console.error(err);
        statusEl.textContent = "failed to load cameras";
      }
    }
  
    loadStreams();
    setInterval(loadStreams, 5000);
  </script>
</body>
</html>
