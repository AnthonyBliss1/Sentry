<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{.Title}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 16px;
      font-family: "JetBrains Mono", monospace;
      background: #050805;
      color: #00ff66;
      text-shadow: 0 0 8px rgba(0, 255, 102, 0.25);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 30px;
      font-size: 32px;
      color: #00ff66;
    }

    h1::before {
      content: "> ";
      color: #00cc55;
    }

    h1::after {
      content: "_";
      margin-left: 4px;
      animation: blink 1s steps(1) infinite;
    }

    #status {
      display: inline-block;
      margin-bottom: 16px;
      padding: 4px 8px;
      color: #00cc55;
      border: 1px solid #00aa44;
      background: #020402;
    }

    #videos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
      gap: 16px;
      width: 100%
    }

    .card {
      background: #050505;
      border: 1px solid #00ff66;
      padding: 12px;
      box-shadow: 0 0 14px rgba(0, 255, 102, 0.12);
    }

    .label {
      margin-bottom: 8px;
      padding-bottom: 8px;
      font-size: 14px;
      color: #00ff66;
      word-break: break-word;
    }

    iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      background: #000;
    }

    .empty {
      padding: 24px;
      border: 1px dashed #00ff66;
      color: #00cc55;
      text-align: center;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 22px;
      }
    }

    @media (min-width: 900px){
      #videos {
        grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      }
    }
  </style>
</head>
<body>
  <h1>{{.Title}}</h1>
  <div id="videos"></div>

  <script>
    const videosEl = document.getElementById("videos");

    const socket = new WebSocket("{{.WebSocketURL}}");

    // test out the ws by sending a stop message on connect
    socket.onopen = (event) => {
      const data = {
        recipient: "bedroom-cam",
        action: "Stop"
      };

      socket.send(JSON.stringify(data))
    };

    socket.onmessage = (event) => {
      console.log("received from server:", event.data);
    };

    let currentKey = "";
  
    function renderStreams(streams) {
      const nextKey = JSON.stringify([...streams].sort());
      if (nextKey === currentKey) {
        console.log(`${streams.length} active camera(s)`);
        return;
      }
  
      currentKey = nextKey;
      videosEl.innerHTML = "";
  
      if (streams.length === 0) {
        console.log("no active cameras");
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No active streams found";
        videosEl.appendChild(empty);
        return;
      }
  
      console.log(`${streams.length} active camera(s)`);
  
      for (const path of streams) {
        const card = document.createElement("div");
        card.className = "card";
  
        const label = document.createElement("div");
        label.className = "label";
        label.textContent = "[" + path + "]";
  
        const frame = document.createElement("iframe");
        frame.allow = "autoplay; fullscreen; picture-in-picture";
        frame.src = `{{.WebRTCBase}}/${encodeURIComponent(path)}`;
  
        card.appendChild(label);
        card.appendChild(frame);
        videosEl.appendChild(card);
      }
    }
  
    async function loadStreams() {
      try {
        const resp = await fetch("/api/streams", { cache: "no-store" });
        if (!resp.ok) {
          throw new Error("failed to load streams: " + resp.status);
        }
  
        const data = await resp.json();
        const streams = Array.isArray(data.streams) ? data.streams : [];
        renderStreams(streams);
      } catch (err) {
        console.error(err);
      }
    }
  
    loadStreams();
    setInterval(loadStreams, 5000);
  </script>
</body>
</html>
