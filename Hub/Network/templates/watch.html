<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>{{.Title}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 16px;
      font-family: "JetBrains Mono", monospace;
      background: #0f172a;
      color: #e2e8f0;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 30px;
      font-size: 32px;
      color: #f8fafc;
    }

    #status {
      display: inline-block;
      margin-bottom: 16px;
      padding: 4px 8px;
      color: #bae6fd;
      border: 1px solid #2563eb;
      background: #020617;
    }

    #videos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
      gap: 16px;
      width: 100%;
    }

    .card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.35);
    }

    .cardHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .label {
      padding-bottom: 0;
      margin-bottom: 0;
      font-size: 14px;
      color: #cbd5e1;
      word-break: break-word;
      flex: 1;
    }

    .stopBtn {
      margin-bottom: 0;
      padding: 6px 10px;
      font-family: inherit;
      color: #f8fafc;
      background: #dc2626;
      border: 1px solid #ef4444;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
    }

    .stopBtn:hover {
      background: #b91c1c;
      border-color: #f87171;
    }

    .stopBtn:active {
      transform: translateY(1px);
    }

    iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      border-radius: 8px;
      background: #000;
    }

    .empty {
      padding: 24px;
      border: 1px dashed #475569;
      border-radius: 10px;
      color: #94a3b8;
      text-align: center;
      background: #111827;
    }

    .inactiveBar {
      margin-bottom: 18px;
      padding: 12px;
      border: 1px solid #334155;
      border-radius: 10px;
      background: #111827;
    }

    .inactiveTitle {
      margin-bottom: 10px;
      font-size: 13px;
      color: #94a3b8;
    }

    .inactiveNodes {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .startBtn {
      flex: 0 0 auto;
      padding: 8px 12px;
      font-family: inherit;
      color: #f8fafc;
      background: #16a34a;
      border: 1px solid #22c55e;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
    }

    .startBtn:hover {
      background: #15803d;
      border-color: #4ade80;
    }

    .startBtn:active {
      transform: translateY(1px);
    }

    .detectionBadge {
      margin-left: 8px;
      padding: 3px 7px;
      border: 1px solid #f59e0b;
      border-radius: 999px;
      color: #fde68a;
      background: #451a03;
      font-size: 12px;
      white-space: nowrap;
    }

    .detectionBadge.hidden {
      display: none;
    }

    .inactiveEmpty {
      color: #64748b;
      font-size: 13px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 22px;
      }

      .cardHeader {
        align-items: flex-start;
        flex-direction: column;
      }

      .stopBtn {
        width: 100%;
      }
    }

    @media (min-width: 900px) {
      #videos {
        grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      }
    }
  </style>
</head>

<body>
  <h1>{{.Title}}</h1>

  <section id="inactiveBar" class="inactiveBar">
    <div class="inactiveTitle">Connected Cameras</div>
    <div id="inactiveNodes" class="inactiveNodes"></div>
  </section>

  <div id="videos"></div>

  <script>
    const videosEl = document.getElementById("videos");
    const inactiveNodesEl = document.getElementById("inactiveNodes");
    const inactiveBarEl = document.getElementById("inactiveBar");
    const socket = new WebSocket("{{.WebSocketURL}}");

    let connectedNodes = new Map();
    let publishingNodes = new Map();

    socket.onmessage = (event) => {
      let msg;

      try {
        msg = JSON.parse(event.data);
      } catch (err) {
        console.error("invalid websocket json:", event.data);
        return;
      }

      console.log("received from server:", msg);

      switch (msg.action) {
        case "new_connection":
        case "node_connected":
        case "node_disconnected":
        case "nodes_updated":
          updateConnectedNodes(msg.connected_nodes || []);
          renderConnectedNodes();
          break;

        default:
          console.log("unhandled websocket action:", msg.action);
          break;
      }
    };

    function updateConnectedNodes(nodes) {
      connectedNodes.clear();

      for (const node of nodes) {
        if (!node.hostname) continue;
        connectedNodes.set(node.hostname, node);
      }
    }

    function renderConnectedNodes() {
      inactiveNodesEl.innerHTML = "";

      const nonPublishingNodes = [];

      for (const [hostname, node] of connectedNodes) {
        if (!publishingNodes.has(hostname)) {
          nonPublishingNodes.push(node);
        }
      }

      if (nonPublishingNodes.length === 0) {
        inactiveBarEl.style.display = "none";
        return;
      }

      inactiveBarEl.style.display = "";

      for (const node of nonPublishingNodes) {
        const btn = document.createElement("button");
        btn.className = "startBtn";
        btn.type = "button";
        btn.textContent = `Turn On ${node.hostname}`;

        btn.addEventListener("click", () => {
          sendStartMessage(socket, node.hostname);
        });

        inactiveNodesEl.appendChild(btn);
      }
    }


    let currentKey = "";

    function renderStreams(streams) {
      const nextKey = JSON.stringify([...streams].sort());

      publishingNodes = new Map();

      for (const path of streams) {
        const hostname = path;
        publishingNodes.set(hostname, hostname);
      }

      renderConnectedNodes();

      if (nextKey === currentKey) {
        console.log(`${streams.length} active camera(s)`);
        return;
      }

      currentKey = nextKey;
      videosEl.innerHTML = "";

      if (streams.length === 0) {
        console.log("no active cameras");

        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No active streams found";

        videosEl.appendChild(empty);
        return;
      }

      console.log(`${streams.length} active camera(s)`);

      for (const path of streams) {
        const hostname = path;

        const card = document.createElement("div");
        card.className = "card";

        const label = document.createElement("div");
        label.className = "label";
        label.textContent = "[" + hostname + "]";

        const detectionBadge = document.createElement("span");
        detectionBadge.className = "detectionBadge hidden";
        detectionBadge.dataset.stream = hostname;
        detectionBadge.textContent = "";

        const stopBtn = document.createElement("button");
        stopBtn.className = "stopBtn";
        stopBtn.textContent = "Turn Off";
        stopBtn.type = "button";

        stopBtn.addEventListener("click", () => {
          sendStopMessage(socket, hostname);
        });

        const frame = document.createElement("iframe");
        frame.allow = "autoplay; fullscreen; picture-in-picture";
        frame.src = `{{.WebRTCBase}}/${encodeURIComponent(hostname)}`;

        const header = document.createElement("div");
        header.className = "cardHeader";

        header.appendChild(label);
        header.appendChild(detectionBadge);
        header.appendChild(stopBtn);

        card.appendChild(header);
        card.appendChild(frame);

        videosEl.appendChild(card);
      }
    }

    function sendStopMessage(socket, deviceID) {
      if (socket.readyState !== WebSocket.OPEN) {
        console.error("WebSocket is not open");
        return;
      }

      const msg = {
        recipient: deviceID,
        action: "stop"
      }
      socket.send(JSON.stringify(msg))
    }

    function sendStartMessage(socket, deviceID) {
      if (socket.readyState !== WebSocket.OPEN) {
        console.error("WebSocket is not open");
        return;
      }

      const msg = {
        recipient: deviceID,
        action: "start"
      }

      socket.send(JSON.stringify(msg))
    }

    function connectDetectionEvents() {
      const events = new EventSource("{{.DetectionEventsURL}}");

      events.addEventListener("dog_detection", (event) => {
        let detection;

        try {
          detection = JSON.parse(event.data);
        } catch (err) {
          console.error("invalid SSE detection json:", event.data);
          return;
        }

        console.log("dog detection:", detection);
        renderDetection(detection);
      });

      events.onerror = () => {
        console.error("detection SSE disconnected; browser will retry");
      };
    }

    function renderDetection(detection) {
      if (!detection || !detection.stream) return;

      const badge = document.querySelector(
        `.detectionBadge[data-stream="${CSS.escape(detection.stream)}"]`
      );

      if (!badge) return;

      badge.classList.remove("hidden");
      badge.textContent = "DOG DETECTED";

      clearTimeout(badge._hideTimer);
      badge._hideTimer = setTimeout(() => {
        badge.classList.add("hidden");
        badge.textContent = "";
      }, 2500);
    }

    async function loadStreams() {
      try {
        const resp = await fetch("/api/streams", {cache: "no-store"});
        if (!resp.ok) {
          throw new Error("failed to load streams: " + resp.status);
        }

        const data = await resp.json();
        const streams = Array.isArray(data.streams) ? data.streams : [];
        renderStreams(streams);
      } catch (err) {
        console.error(err);
      }
    }

    loadStreams();
    setInterval(loadStreams, 5000);
    connectDetectionEvents();
  </script>
</body>

</html>
