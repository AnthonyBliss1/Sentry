<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>{{.Title}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 16px;
      font-family: "JetBrains Mono", monospace;
      background: #0f172a;
      color: #e2e8f0;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 30px;
      font-size: 32px;
      color: #f8fafc;
    }

    #status {
      display: inline-block;
      margin-bottom: 16px;
      padding: 4px 8px;
      color: #bae6fd;
      border: 1px solid #2563eb;
      background: #020617;
    }

    #videos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
      gap: 16px;
      width: 100%;
    }

    .card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.35);
    }

    .cardHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .label {
      padding-bottom: 0;
      margin-bottom: 0;
      font-size: 14px;
      color: #cbd5e1;
      word-break: break-word;
      flex: 1;
    }

    .stopBtn {
      margin-bottom: 0;
      padding: 6px 10px;
      font-family: inherit;
      color: #f8fafc;
      background: #dc2626;
      border: 1px solid #ef4444;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
    }

    .stopBtn:hover {
      background: #b91c1c;
      border-color: #f87171;
    }

    .stopBtn:active {
      transform: translateY(1px);
    }

    iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      border-radius: 8px;
      background: #000;
    }

    .empty {
      padding: 24px;
      border: 1px dashed #475569;
      border-radius: 10px;
      color: #94a3b8;
      text-align: center;
      background: #111827;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 22px;
      }

      .cardHeader {
        align-items: flex-start;
        flex-direction: column;
      }

      .stopBtn {
        width: 100%;
      }
    }

    @media (min-width: 900px) {
      #videos {
        grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      }
    }
  </style>
</head>

<body>
  <h1>{{.Title}}</h1>
  <div id="videos"></div>

  <script>
    const videosEl = document.getElementById("videos");

    const socket = new WebSocket("{{.WebSocketURL}}");

    socket.onmessage = (event) => {
      console.log("received from server:", event.data);
    };

    let currentKey = "";

    function renderStreams(streams) {
      const nextKey = JSON.stringify([...streams].sort());
      if (nextKey === currentKey) {
        console.log(`${streams.length} active camera(s)`);
        return;
      }

      currentKey = nextKey;
      videosEl.innerHTML = "";

      if (streams.length === 0) {
        console.log("no active cameras");
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No active streams found";
        videosEl.appendChild(empty);
        return;
      }

      console.log(`${streams.length} active camera(s)`);

      for (const path of streams) {
        const card = document.createElement("div");
        card.className = "card";

        const label = document.createElement("div");
        label.className = "label";
        label.textContent = "[" + path + "]";

        const stopBtn = document.createElement("button");
        stopBtn.className = "stopBtn";
        stopBtn.textContent = "Turn Off";
        stopBtn.type = "button";

        stopBtn.addEventListener("click", () => {
          sendStopMessage(socket, path);
        });

        const frame = document.createElement("iframe");
        frame.allow = "autoplay; fullscreen; picture-in-picture";
        frame.src = `{{.WebRTCBase}}/${encodeURIComponent(path)}`;

        const header = document.createElement("div");
        header.className = "cardHeader";

        header.appendChild(label);
        header.appendChild(stopBtn);

        card.appendChild(header);
        card.appendChild(frame);
        videosEl.appendChild(card);
      }
    }

    function sendStopMessage(socket, deviceID) {
      if (socket.readyState !== WebSocket.OPEN) {
        console.error("WebSocket is not open");
        return;
      }

      const msg = {
        recipient: deviceID,
        action: "Stop"
      }
      socket.send(JSON.stringify(msg))
    }

    function sendStartMessage(socket, deviceID) {
      if (socket.readyState !== WebSocket.OPEN) {
        console.error("WebSocket is not open");
        return;
      }

      const msg = {
        recipient: deviceID,
        action: "Start"
      }

      socket.send(JSON.stringify(msg))
    }

    async function loadStreams() {
      try {
        const resp = await fetch("/api/streams", {cache: "no-store"});
        if (!resp.ok) {
          throw new Error("failed to load streams: " + resp.status);
        }

        const data = await resp.json();
        const streams = Array.isArray(data.streams) ? data.streams : [];
        renderStreams(streams);
      } catch (err) {
        console.error(err);
      }
    }

    loadStreams();
    setInterval(loadStreams, 5000);
  </script>
</body>

</html>
